<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="currentColor">
  <!-- #WeAlsoMakeTomorrow campaign mark -->
  <!-- Hashtag symbol -->
  <text x="10" y="28" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="20">#</text>
  <!-- WeAlso -->
  <text x="28" y="28" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="18" letter-spacing="1">WeAlso</text>
  <!-- MakeTomorrow — bold -->
  <text x="28" y="48" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="20" letter-spacing="2">MakeTomorrow</text>
</svg>